<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do JavaScript</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <main id="tasks-container">
        <section id="tasks-header">
            <h2>Salve sua próxima tarefa:</h2>
            <form action="" id="add-tasks-form">
                <input type="text" id="task-title" placeholder="O que voçê vai fazer hoje?">
                <button id="add-btn">
                    <ion-icon name="add-outline"></ion-icon>
                </button>
            </form>
        </section>
        <article id="tasks-list-container">
            <h2>Estas são as suas tarefas:</h2>
            <ul id="task-list">
                <li class="task-box template hide" >
                    <span class="task-title"></span>
                    <ion-icon class="done-btn" name="checkmark-outline"></ion-icon>
                    <ion-icon class="remove-btn" name="close-outline"></ion-icon>
                </li>
            </ul>
        </article>
    </main>
        <script src="Scripts/script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@5.1.2/dist/ionicons/ionicons.esm.js"></script>
</body>
</html>
